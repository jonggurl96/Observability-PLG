# README에 정의된 관측성 아키텍처를 한 번에 실행할 수 있도록
# 애플리케이션과 모니터링 스택을 단일 Compose 파일로 묶는다.
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: observability-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - observability

  backend:
    build:
      context: ./backend
    container_name: observability-backend
    environment:
      LOG_DIR: /var/log/observability/backend
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"
    volumes:
      - ./logs/backend:/var/log/observability/backend
    networks:
      - observability

  frontend:
    build:
      context: ./frontend
    container_name: observability-frontend
    depends_on:
      - backend
    environment:
      APP_BASE_URL: http://frontend:3000
      APP_LOG_DIR: /var/log/observability/frontend
      BACKEND_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    volumes:
      - ./logs/frontend:/var/log/observability/frontend
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: observability-prometheus
    depends_on:
      - backend
      - frontend
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  loki:
    image: grafana/loki:3.2.0
    container_name: observability-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:3.2.0
    container_name: observability-promtail
    depends_on:
      - loki
    command: -config.file=/etc/promtail/config.yml
    ports:
      - "9080:9080"
    volumes:
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./logs/backend:/var/log/observability/backend:ro
      - ./logs/frontend:/var/log/observability/frontend:ro
      - ./logs/nginx:/var/log/nginx:ro
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.2.0
    container_name: observability-grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
