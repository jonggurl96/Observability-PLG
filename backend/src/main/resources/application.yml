# actuator를 루트 경로에 노출해 README의 /health 요구사항과 Prometheus 스크랩 경로를 맞춘다.
spring:
  application:
    name: observability-backend

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  config: classpath:log4j2-spring.xml
